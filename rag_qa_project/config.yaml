# RAG pipeline defaults (override with CLI flags where supported)

corpus_dir: data/corpus
index_dir: data/index

chunking:
  max_chars: 900
  overlap_chars: 120

retrieval:
  top_k: 5
  # dense | bm25 | hybrid (weighted sum of normalized scores)
  mode: dense
  hybrid_bm25_weight: 0.35

embedding:
  model_name: sentence-transformers/all-MiniLM-L6-v2

generation:
  openai_model: gpt-4o-mini
  temperature: 0.2
  max_tokens: 512
