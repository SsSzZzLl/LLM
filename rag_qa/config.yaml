# RAG pipeline defaults (override with CLI flags where supported)

corpus_dir: data/corpus
index_dir: data/index

chunking:
  max_tokens: 256
  overlap_tokens: 30
  model_name: cl100k_base

retrieval:
  top_k: 5
  # dense | bm25 | hybrid (weighted sum of normalized scores)
  mode: hybrid
  hybrid_bm25_weight: 0.35

embedding:
  model_name: sentence-transformers/all-MiniLM-L6-v2

generation:
  temperature: 0.2
  max_tokens: 2048
